{% extends "base.html" %}
{% block content %}

<style>
/* Layout */
.main-layout {
    gap: var(--space-lg);
    max-width: 1200px;
    margin: 0 auto;
    padding: var(--space-lg) var(--space-md);
    align-items: start;
}

.side-panel {
    display: flex;
    flex-direction: column;
    gap: var(--space-md);
}

/* Action Panel - Smaller buttons */
.action-btn {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    padding: var(--space-xs) var(--space-sm);
    background: var(--bg-elevated);
    border: 1px solid var(--border-default);
    border-radius: 6px;
    color: var(--text-main);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    transition: all 0.15s ease;
    width: 100%;
    text-decoration: none;
}

.action-btn:hover {
    background: var(--primary);
    color: var(--bg-deep);
    border-color: var(--primary);
    transform: translateX(2px);
}

.action-btn.primary {
    background: var(--bg-elevated);
    border-color: var(--border-default);
    color: var(--text-main);
}

.action-btn.primary:hover {
    background: var(--primary);
    color: var(--bg-deep);
    border-color: var(--primary);
}

.action-btn-icon {
    font-size: 0.85rem;
}

/* Focus Mode */
.focus-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--bg-deep);
    z-index: 2000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: var(--space-xl);
}

.focus-overlay.active {
    display: flex;
}

.focus-header {
    text-align: center;
    margin-bottom: var(--space-xl);
}

.focus-title {
    font-family: 'Press Start 2P', cursive;
    font-size: 1rem;
    color: var(--primary);
    margin-bottom: var(--space-md);
    text-shadow: 0 0 20px var(--primary-glow);
}

.focus-task-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.5rem;
    color: var(--text-main);
    margin-bottom: var(--space-lg);
}

.focus-timer {
    font-family: 'JetBrains Mono', monospace;
    font-size: 4rem;
    font-weight: bold;
    color: var(--accent);
    text-shadow: 0 0 30px var(--accent-glow);
    margin-bottom: var(--space-xl);
}

.focus-actions {
    display: flex;
    gap: var(--space-lg);
}

.focus-btn {
    font-family: 'Press Start 2P', cursive;
    font-size: 0.6rem;
    padding: var(--space-md) var(--space-xl);
    border: 3px solid var(--border-default);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.focus-btn.complete {
    background: var(--success);
    color: white;
    border-color: var(--success);
}

.focus-btn.complete:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
}

.focus-btn.exit {
    background: var(--bg-elevated);
    color: var(--text-main);
}

.focus-btn.exit:hover {
    border-color: var(--danger);
    color: var(--danger);
}

.focus-exit-fixed {
    position: fixed;
    top: var(--space-lg);
    right: var(--space-lg);
}

/* Task card improvements */
.task-card {
    transition: all 0.15s ease;
    border: 2px solid transparent;
}

.task-card:hover {
    border-color: var(--primary);
    transform: translateX(2px);
}

.task-xp {
    color: var(--warning);
    font-size: 0.6rem;
    font-weight: 600;
    opacity: 0.8;
    white-space: nowrap;
}

/* Momentum Panel - Tightened */
.momentum-panel {
    background: linear-gradient(135deg, var(--bg-surface), var(--bg-elevated));
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: var(--space-md);
    margin-bottom: var(--space-md);
    position: relative;
    overflow: hidden;
}

.momentum-panel::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--primary), var(--accent), var(--primary));
    background-size: 200% 100%;
    animation: shimmer 3s ease infinite;
}

@keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}

.momentum-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: var(--space-sm);
}

.momentum-title {
    font-family: 'Press Start 2P', cursive;
    font-size: 0.5rem;
    color: var(--primary);
}

.momentum-streak {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--warning);
}

.momentum-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--space-sm);
    margin-bottom: var(--space-sm);
}

.momentum-stat {
    text-align: center;
}

.momentum-stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
    font-weight: bold;
    color: var(--text-main);
}

.momentum-stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-muted);
}

.momentum-progress {
    background: var(--bg-elevated);
    border-radius: 6px;
    height: 8px;
    overflow: hidden;
}

.momentum-progress-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.3s ease;
}

.momentum-progress-label {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-muted);
}

/* Empty states */
.empty-state {
    text-align: center;
    padding: var(--space-md);
    opacity: 0.7;
}

.empty-state-icon {
    font-size: 2rem;
    display: block;
    margin-bottom: var(--space-xs);
}

.empty-state-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--text-muted);
    font-style: italic;
}

/* Task section styling - Tightened */
.task-section {
    transition: all 0.2s ease;
    margin-bottom: var(--space-md);
}

.task-section.everyday {
    opacity: 0.9;
}

.task-section.today {
    border-color: var(--primary);
    box-shadow: 0 0 15px var(--primary-glow);
}

.section-title {
    font-size: 0.55rem;
}

.task-section.everyday .section-title {
    color: var(--text-muted);
}

.task-section.today .section-title {
    color: var(--primary);
}

.collapsible-content {
    transition: all 0.2s ease;
}

/* Game panel - Reduced padding */
.game-panel {
    padding: var(--space-md);
}

/* Efficiency panel - Tightened */
.efficiency-panel {
    padding: var(--space-sm);
    margin-bottom: var(--space-sm);
}

.efficiency-value {
    font-size: 1.5rem;
}

/* Focus Modal */
.focus-modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1500;
    align-items: center;
    justify-content: center;
}

.focus-modal-overlay.active {
    display: flex;
}

.focus-modal {
    background: var(--bg-surface);
    border: 2px solid var(--primary);
    border-radius: 10px;
    padding: var(--space-lg);
    max-width: 450px;
    width: 90%;
    max-height: 70vh;
    overflow-y: auto;
}

.focus-modal-title {
    font-family: 'Press Start 2P', cursive;
    font-size: 0.6rem;
    color: var(--primary);
    margin-bottom: var(--space-md);
    text-align: center;
}

.focus-task-option {
    display: block;
    width: 100%;
    padding: var(--space-sm);
    margin-bottom: var(--space-xs);
    background: var(--bg-elevated);
    border: 1px solid var(--border-default);
    border-radius: 6px;
    color: var(--text-main);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s ease;
}

.focus-task-option:hover {
    border-color: var(--primary);
    background: var(--primary);
    color: var(--bg-deep);
}

.focus-task-option .task-xp {
    display: block;
    margin-top: 2px;
}

.focus-modal-close {
    display: block;
    width: 100%;
    margin-top: var(--space-sm);
    padding: var(--space-xs);
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
}

.focus-modal-close:hover {
    color: var(--text-main);
}

/* Stats panel */
.stats-panel {
    padding: var(--space-md);
}

.panel-header {
    font-size: 0.5rem;
    padding-bottom: var(--space-sm);
    margin-bottom: var(--space-sm);
}

.stat-row {
    padding: 6px 0;
    font-size: 0.7rem;
    line-height: 1.4;
}

/* XP Bar in Stats */
.xp-bar-container {
    margin-top: var(--space-sm);
    padding-top: var(--space-sm);
    border-top: 1px solid var(--border-default);
}

.xp-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.6rem;
    color: var(--text-muted);
    margin-bottom: 4px;
}

.xp-bar-label .level-badge {
    color: var(--primary);
    font-weight: 600;
}

.xp-bar {
    height: 6px;
    background: var(--bg-elevated);
    border-radius: 3px;
    overflow: hidden;
}

.xp-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    border-radius: 3px;
    transition: width 0.5s ease;
}

/* Task Search */
.task-search {
    margin-bottom: var(--space-md);
}

.task-search input {
    width: 100%;
    background: var(--bg-elevated);
    border: 1px solid var(--border-default);
    border-radius: 6px;
    padding: var(--space-sm) var(--space-md);
    color: var(--text-main);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
}

.task-search input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 8px var(--primary-glow);
}

.task-search input::placeholder {
    color: var(--text-dim);
}

/* Recurrence select */
select[name="recurrence"] {
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-radius: 4px;
    padding: var(--space-sm) var(--space-md);
    color: var(--text-main);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
}

select[name="recurrence"]:focus {
    outline: none;
    border-color: var(--primary);
}

/* Drag and Drop */
.task-card[draggable="true"] {
    cursor: grab;
}

.task-card[draggable="true"]:active {
    cursor: grabbing;
}

.task-card.dragging {
    opacity: 0.5;
    transform: scale(0.98);
}

.task-card.drag-over {
    border-color: var(--accent);
    box-shadow: 0 -4px 0 0 var(--accent);
}
/* Async dashboard skeleton */
.loading-banner {
    background: linear-gradient(135deg, var(--bg-surface), var(--bg-elevated));
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: var(--space-md);
    margin-bottom: var(--space-md);
    font-family: 'Press Start 2P', cursive;
    font-size: 0.6rem;
    color: var(--text-muted);
}

.skeleton-block {
    border-radius: 8px;
    border: 1px solid var(--border-default);
    background: linear-gradient(90deg, rgba(255,255,255,0.04), rgba(255,255,255,0.08), rgba(255,255,255,0.04));
    background-size: 200% 100%;
    animation: skeleton-shimmer 1.1s ease-in-out infinite;
}

@keyframes skeleton-shimmer {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
}
</style>

<div class="main-layout">
    <!-- SIDE PANEL -->
    <aside class="side-panel">
        <!-- Stats (async) -->
        <div class="stats-panel" id="sideStats">
            <div class="panel-header">STATS</div>
            <div class="skeleton-block" style="height: 170px;"></div>
        </div>

        <!-- Action Panel -->
        <div class="stats-panel">
            <div class="panel-header">⚡ ACTIONS</div>
            <button class="action-btn" onclick="dashboardEnsureReady(openAddTaskModal)">
                <span class="action-btn-icon">➕</span>
                Add Task
            </button>
            <button class="action-btn" onclick="dashboardEnsureReady(openAddEverydayModal)">
                <span class="action-btn-icon">🔄</span>
                Add Everyday
            </button>
            <button class="action-btn primary" onclick="dashboardEnsureReady(openFocusModal)">
                <span class="action-btn-icon">🧠</span>
                Focus Mode
            </button>
            <button class="action-btn" onclick="dashboardEnsureReady(randomTask)">
                <span class="action-btn-icon">🎲</span>
                Random Task
            </button>
        </div>
        <!-- Recent Catches (async) -->
        <div class="stats-panel" id="sideRecent">
            <div class="panel-header">RECENT</div>
            <div class="skeleton-block" style="height: 120px;"></div>
        </div>
    </aside>
    <!-- MAIN PANEL -->
    <main id="dashboardMain">
        <div class="loading-banner" id="dashboardLoading">
            Loading your empire...
            <div class="skeleton-block" style="height: 18px; margin-top: 10px;"></div>
        </div>
        <div class="game-panel">
            <div class="skeleton-block" style="height: 220px;"></div>
        </div>
        <div class="game-panel" style="margin-top: var(--space-md);">
            <div class="skeleton-block" style="height: 220px;"></div>
        </div>
        <noscript>
            <div class="game-panel" style="margin-top: var(--space-md);">
                JavaScript is required to load the dashboard content.
            </div>
        </noscript>
    </main>
</div>

<div id="dashboardModals"></div>

<script>
let __dashboardReady = false;

function dashboardEnsureReady(fn) {
    if (__dashboardReady) {
        fn();
        return;
    }
    const banner = document.getElementById('dashboardLoading');
    if (banner) {
        banner.textContent = 'Loading…';
    }
}

function initDashboardInteractions() {
    const retireModal = document.getElementById('retireConfirmModal');
    if (retireModal && !retireModal.dataset.bound) {
        retireModal.addEventListener('click', function(e) {
            if (e.target === this) closeRetireConfirm();
        });
        retireModal.dataset.bound = '1';
    }
}

async function _fetchFragment(path) {
    const res = await fetch(path, { credentials: 'same-origin' });
    if (!res.ok) throw new Error(`Fragment failed: ${path}`);
    return res.text();
}

async function loadDashboardFragments() {
    try {
        const [sideStatsHtml, sideRecentHtml, mainHtml, modalsHtml] = await Promise.all([
            _fetchFragment('/dashboard/fragment/side_stats'),
            _fetchFragment('/dashboard/fragment/side_recent'),
            _fetchFragment('/dashboard/fragment/main'),
            _fetchFragment('/dashboard/fragment/modals'),
        ]);

        const sideStats = document.getElementById('sideStats');
        if (sideStats) sideStats.outerHTML = sideStatsHtml;

        const sideRecent = document.getElementById('sideRecent');
        if (sideRecent) {
            if (sideRecentHtml && sideRecentHtml.trim()) {
                sideRecent.outerHTML = sideRecentHtml;
            } else {
                sideRecent.remove();
            }
        }

        const main = document.getElementById('dashboardMain');
        if (main) main.innerHTML = mainHtml;

        const modals = document.getElementById('dashboardModals');
        if (modals) modals.innerHTML = modalsHtml;

        __dashboardReady = true;
        initDragAndDrop();
        initDashboardInteractions();
    } catch (err) {
        const banner = document.getElementById('dashboardLoading');
        if (banner) {
            banner.textContent = 'Failed to load dashboard. Refresh to retry.';
        }
        console.error(err);
    }
}

document.addEventListener('DOMContentLoaded', loadDashboardFragments);

let _retireTargetFormId = null;

function openRetireConfirm(taskId, taskName) {
    _retireTargetFormId = 'retire-form-' + taskId;
    document.getElementById('retireTaskNameDisplay').textContent = taskName;
    document.getElementById('retireConfirmModal').classList.add('active');
}

function closeRetireConfirm() {
    _retireTargetFormId = null;
    document.getElementById('retireConfirmModal').classList.remove('active');
}

function confirmRetire() {
    if (_retireTargetFormId) {
        const form = document.getElementById(_retireTargetFormId);
        if (form) form.submit();
    }
}
// retireConfirmModal click binding is attached after async modals load (initDashboardInteractions).

let focusTaskId = null;
let focusTimerInterval = null;
let focusSeconds = 25 * 60;

function openFocusModal() {
    document.getElementById('focusModal').classList.add('active');
}

function closeFocusModal() {
    document.getElementById('focusModal').classList.remove('active');
}

function startFocusModeFromButton(btn) {
    startFocusMode(btn.dataset.taskId, btn.dataset.taskName || 'Task');
}

function startFocusMode(taskId, taskName) {
    closeFocusModal();
    
    focusTaskId = taskId;
    document.getElementById('focusTaskName').textContent = taskName;
    focusSeconds = 25 * 60;
    updateTimerDisplay();
    const timer = document.getElementById('focusTimer');
    timer.style.color = '';
    timer.style.animation = '';
    
    document.getElementById('focusOverlay').classList.add('active');
    document.body.style.overflow = 'hidden';
    
    focusTimerInterval = setInterval(() => {
        focusSeconds--;
        updateTimerDisplay();
        
        if (focusSeconds <= 0) {
            clearInterval(focusTimerInterval);
            focusSeconds = 0;
            updateTimerDisplay();
            const timer = document.getElementById('focusTimer');
            timer.style.color = 'var(--danger)';
            timer.style.animation = 'pulse 0.5s ease 3';
        }
    }, 1000);
}

function updateTimerDisplay() {
    const mins = Math.floor(focusSeconds / 60);
    const secs = focusSeconds % 60;
    document.getElementById('focusTimer').textContent = 
        `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
}

function completeFocusTask() {
    if (focusTaskId) {
        clearInterval(focusTimerInterval);
        
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = `/tasks/toggle/${focusTaskId}`;
        form.innerHTML = `<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">`;
        document.body.appendChild(form);
        form.submit();
    }
}

function exitFocusMode() {
    clearInterval(focusTimerInterval);
    document.getElementById('focusOverlay').classList.remove('active');
    document.body.style.overflow = '';
    focusTaskId = null;
    focusSeconds = 25 * 60;
    updateTimerDisplay();
}

function randomTask() {
    const tasks = document.querySelectorAll('.task-card.today:not(.completed), .task-card.everyday:not(.completed):not(.ended)');
    if (tasks.length > 0) {
        const randomTask = tasks[Math.floor(Math.random() * tasks.length)];
        randomTask.scrollIntoView({ behavior: 'smooth', block: 'center' });
        randomTask.style.animation = 'none';
        randomTask.offsetHeight;
        randomTask.style.animation = 'highlight 1s ease';
    }
}

function openAddTaskModal() {
    const input = document.querySelector('.task-section.today .add-task-form input[name="name"]');
    if (input) {
        input.focus();
        document.querySelector('.task-section.today .collapsible-content').classList.add('show');
    }
}

function openAddEverydayModal() {
    const input = document.querySelector('.task-section.everyday .add-task-form input[name="name"]');
    if (input) {
        input.focus();
        document.querySelector('.task-section.everyday .collapsible-content').classList.add('show');
    }
}

document.getElementById('focusModal').addEventListener('click', function(e) {
    if (e.target === this) {
        closeFocusModal();
    }
});

function toggleTaskDetails(btn) {
    const card = btn.closest('.task-card');
    const dropdown = card.querySelector('.task-details-dropdown');
    const section = card.closest('.task-section');
    const isCollapsed = section && section.querySelector('.section-header').classList.contains('collapsed');
    
    // Don't open dropdown if section is collapsed
    if (isCollapsed) return;
    
    const isOpen = dropdown.classList.contains('open');
    
    // Close all dropdowns and reset all card z-indexes
    document.querySelectorAll('.task-details-dropdown.open').forEach(d => {
        d.classList.remove('open');
        d.style.opacity = '0';
        d.style.transform = 'translateY(-10px)';
        d.closest('.task-card').style.zIndex = '';
    });
    
    // If it wasn't open, open this one and elevate its card above siblings
    if (!isOpen) {
        card.style.zIndex = '10';
        dropdown.classList.add('open');
        requestAnimationFrame(() => {
            dropdown.style.opacity = '1';
            dropdown.style.transform = 'translateY(0)';
        });
    }
}

// Close dropdowns when clicking outside
document.addEventListener('click', function(e) {
    if (!e.target.closest('.task-details-dropdown') && !e.target.closest('.task-expand-btn')) {
        document.querySelectorAll('.task-details-dropdown.open').forEach(d => {
            d.classList.remove('open');
            d.style.opacity = '0';
            d.style.transform = 'translateY(-10px)';
            d.closest('.task-card').style.zIndex = '';
        });
    }
});

// Task search/filter
function filterTasks() {
    const query = document.getElementById('taskSearchInput').value.toLowerCase();
    const taskCards = document.querySelectorAll('.task-card');
    
    taskCards.forEach(card => {
        const taskName = card.querySelector('.task-name')?.textContent.toLowerCase() || '';
        const taskSection = card.closest('.task-section');
        
        if (taskName.includes(query)) {
            card.style.display = '';
            if (taskSection) taskSection.style.display = '';
        } else {
            card.style.display = 'none';
        }
    });
    
    // Hide empty sections
    document.querySelectorAll('.task-section').forEach(section => {
        const visibleCards = section.querySelectorAll('.task-card:not([style*="display: none"])');
        const emptyState = section.querySelector('.empty-state');
        if (visibleCards.length === 0 && !emptyState) {
            section.style.display = 'none';
        } else if (visibleCards.length > 0) {
            section.style.display = '';
        }
    });
}

// Drag and Drop Reordering
let draggedElement = null;

function initDragAndDrop() {
    const taskLists = document.querySelectorAll('.task-list');
    
    taskLists.forEach(list => {
        const cards = list.querySelectorAll('.task-card[draggable="true"]');
        
        cards.forEach(card => {
            if (card.dataset.dndBound === '1') return;
            card.addEventListener('dragstart', handleDragStart);
            card.addEventListener('dragend', handleDragEnd);
            card.addEventListener('dragover', handleDragOver);
            card.addEventListener('dragenter', handleDragEnter);
            card.addEventListener('dragleave', handleDragLeave);
            card.addEventListener('drop', handleDrop);
            card.dataset.dndBound = '1';
        });
    });
}

function handleDragStart(e) {
    draggedElement = this;
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/html', this.innerHTML);
}

function handleDragEnd(e) {
    this.classList.remove('dragging');
    document.querySelectorAll('.task-card').forEach(card => {
        card.classList.remove('drag-over');
    });
    draggedElement = null;
}

function handleDragOver(e) {
    if (e.preventDefault) {
        e.preventDefault();
    }
    e.dataTransfer.dropEffect = 'move';
    return false;
}

function handleDragEnter(e) {
    if (this !== draggedElement) {
        this.classList.add('drag-over');
    }
}

function handleDragLeave(e) {
    this.classList.remove('drag-over');
}

function handleDrop(e) {
    e.stopPropagation();
    e.preventDefault();
    
    if (draggedElement !== this) {
        const taskList = this.closest('.task-list');
        const allCards = [...taskList.querySelectorAll('.task-card[draggable="true"]')];
        const draggedIndex = allCards.indexOf(draggedElement);
        const droppedIndex = allCards.indexOf(this);
        
        if (draggedIndex < droppedIndex) {
            taskList.insertBefore(draggedElement, this.nextSibling);
        } else {
            taskList.insertBefore(draggedElement, this);
        }
        
        // Update order in database
        saveTaskOrder(taskList);
    }
    
    this.classList.remove('drag-over');
    return false;
}

function saveTaskOrder(taskList) {
    const cards = taskList.querySelectorAll('.task-card[draggable="true"]');
    const orders = {};
    
    cards.forEach((card, index) => {
        const taskId = card.getAttribute('data-task-id');
        if (taskId) {
            orders[taskId] = index;
        }
    });
    
    // Send to server
    const formData = new FormData();
    formData.append('orders', JSON.stringify(orders));
    formData.append('csrf_token', document.querySelector('input[name="csrf_token"]')?.value || '');
    
    fetch('/tasks/reorder', {
        method: 'POST',
        body: formData
    }).catch(err => {
        console.error('Failed to save task order:', err);
    });
}

// Initialize drag and drop when DOM is ready
// Drag/drop is initialized after async content load.

</script>
